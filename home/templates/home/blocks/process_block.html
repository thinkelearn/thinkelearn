{% load wagtailcore_tags %}

<div class="process-block">
    <div class="flex items-start gap-6">
        <div class="flex-shrink-0">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg">
                <i class="{{ value.icon }} text-cyan-600 text-2xl"></i>
            </div>
        </div>
        <div class="flex-1">
            <h3 class="text-2xl lg:text-3xl font-heading font-bold text-primary-800 mb-4">
                {{ value.title }}
            </h3>
            <div class="prose prose-lg max-w-none text-neutral-700 leading-relaxed">
                {{ value.content|richtext }}
            </div>
        </div>
    </div>
</div>
