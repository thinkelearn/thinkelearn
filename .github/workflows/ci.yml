name: CI/CD Pipeline

# Streamlined CI focusing on business logic testing
# Tests: 25 focused business logic tests (Twilio workflows, custom methods)
# No framework over-testing (Django/Wagtail core functionality not tested)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '20'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_thinkelearn
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Cache uv dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}

    - name: Install Python dependencies
      run: |
        uv venv
        uv pip install -e .[test,dev]

    - name: Cache npm dependencies
      uses: actions/cache@v3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

    - name: Install Node.js dependencies
      run: |
        npm ci

    - name: Build CSS
      run: |
        npm run build-css-prod

    - name: Run Django system checks
      env:
        DJANGO_SETTINGS_MODULE: thinkelearn.settings.test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_thinkelearn
      run: |
        uv run python manage.py check --deploy

    - name: Run migrations
      env:
        DJANGO_SETTINGS_MODULE: thinkelearn.settings.test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_thinkelearn
      run: |
        uv run python manage.py migrate

    - name: Run streamlined business logic tests
      env:
        DJANGO_SETTINGS_MODULE: thinkelearn.settings.test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_thinkelearn
      run: |
        echo "Running 25 focused business logic tests (no framework over-testing)"
        uv run python manage.py test --verbosity=2 --keepdb --failfast
        echo "✅ All tests focus on custom business logic, not Django/Wagtail framework functionality"

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Cache uv dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        uv venv
        uv pip install -e .[dev]

    - name: Run ruff linting
      run: |
        uv run ruff check .

    - name: Run ruff formatting check
      run: |
        uv run ruff format --check .

    - name: Run mypy type checking
      run: |
        uv run mypy . --config-file pyproject.toml

  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Cache uv dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        uv venv
        uv pip install -e .[security]

    - name: Run safety check
      run: |
        uv run safety check

    - name: Run bandit security linter
      run: |
        uv run bandit -c pyproject.toml -r . -f json

  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Cache npm dependencies
      uses: actions/cache@v3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

    - name: Install dependencies
      run: |
        npm ci

    - name: Build CSS for production
      run: |
        npm run build-css-prod

    - name: Verify CSS build
      run: |
        test -f thinkelearn/static/css/thinkelearn.css

    - name: Check CSS size
      run: |
        ls -lah thinkelearn/static/css/thinkelearn.css

  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image (test only)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: thinkelearn:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [test, lint, security, build-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          service: web
          detach: true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
