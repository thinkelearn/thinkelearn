{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-neutral-50 flex items-center justify-center px-4 py-16">
    <div class="max-w-lg w-full bg-white rounded-lg shadow-md p-8 text-center">
        <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-yellow-100">
            <svg class="h-6 w-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M12 5.5a7.5 7.5 0 110 15 7.5 7.5 0 010-15z"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-semibold text-neutral-900">Checkout canceled</h1>
        <p class="mt-3 text-neutral-600">
            Your payment was not completed. You can return to the course page to try again.
        </p>
        <div class="mt-6 flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/"
               class="inline-flex items-center justify-center rounded-md bg-cyan-600 px-4 py-2 text-sm font-medium text-white hover:bg-cyan-700">
                Back to courses
            </a>
            <a href="/dashboard/"
               class="inline-flex items-center justify-center rounded-md border border-neutral-300 px-4 py-2 text-sm font-medium text-neutral-700 hover:bg-neutral-50">
                Go to dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
