{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-neutral-50 flex items-center justify-center px-4 py-16">
    <div class="max-w-lg w-full bg-white rounded-lg shadow-md p-8 text-center">
        <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-green-100">
            <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-semibold text-neutral-900">Refund request received</h1>
        <p class="mt-3 text-neutral-600">
            Thanks for letting us know. Our team will review your request and follow up by email.
        </p>
        <p class="mt-2 text-xs text-neutral-400">Submitted: {{ submitted_at|date:"M d, Y" }}</p>
        <div class="mt-6 flex flex-col sm:flex-row gap-3 justify-center">
            <a
                href="{{ course.url }}"
                class="inline-flex items-center justify-center rounded-md bg-secondary-600 px-4 py-2 text-sm font-medium text-white hover:bg-secondary-700"
            >
                Back to course
            </a>
            <a
                href="/dashboard/"
                class="inline-flex items-center justify-center rounded-md border border-neutral-300 px-4 py-2 text-sm font-medium text-neutral-700 hover:bg-neutral-50"
            >
                Go to dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
