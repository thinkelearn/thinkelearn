services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot reloading
      - .:/app
      # Preserve node_modules
      - /app/node_modules
    environment:
      - DJANGO_SETTINGS_MODULE=thinkelearn.settings.dev
      - DATABASE_URL=postgres://postgres:postgres@db:5432/thinkelearn
      - REDIS_URL=redis://redis:6379/0
      # Twilio configuration
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      # Email notification configuration
      - VOICEMAIL_NOTIFICATION_EMAILS=${VOICEMAIL_NOTIFICATION_EMAILS}
      - SMS_NOTIFICATION_EMAILS=${SMS_NOTIFICATION_EMAILS}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
      # S3 configuration (MinIO)
      - AWS_STORAGE_BUCKET_NAME=thinkelearn-dev
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_S3_REGION_NAME=us-east-1
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - AWS_S3_BROWSER_ENDPOINT_URL=http://localhost:9000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    command: python manage.py runserver 0.0.0.0:8000

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=thinkelearn
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@thinkelearn.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  celery:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - DJANGO_SETTINGS_MODULE=thinkelearn.settings.dev
      - DATABASE_URL=postgres://postgres:postgres@db:5432/thinkelearn
      - REDIS_URL=redis://redis:6379/0
      # S3 configuration (MinIO)
      - AWS_STORAGE_BUCKET_NAME=thinkelearn-dev
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_S3_REGION_NAME=us-east-1
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - AWS_S3_BROWSER_ENDPOINT_URL=http://localhost:9000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    command: celery -A thinkelearn worker -l info

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "Waiting for MinIO..."
          sleep 1
        done
        mc mb local/thinkelearn-dev --ignore-existing

  css:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: ["sh", "-c", "npm run build-css"]
    stdin_open: true
    tty: true

  stripe:
    image: stripe/stripe-cli:latest
    profiles: ["stripe"]
    env_file:
      - .env
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      - web
    command: >
      listen
      --api-key ${STRIPE_SECRET_KEY}
      --forward-to http://web:8000/payments/webhook/

volumes:
  postgres_data:
  pgadmin_data:
  minio_data:
