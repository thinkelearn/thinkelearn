[build]
builder = "nixpacks"
buildCommand = "npm run build-css-prod && python manage.py collectstatic --noinput"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[environments.production]
variables = { DJANGO_SETTINGS_MODULE = "thinkelearn.settings.production" }

[environments.staging]
variables = { DJANGO_SETTINGS_MODULE = "thinkelearn.settings.dev" }
