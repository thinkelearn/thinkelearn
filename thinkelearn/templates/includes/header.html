{% load wagtailcore_tags static %}

<header class="bg-white shadow-sm sticky top-0 z-50">
    <nav class="max-w-7xl mx-auto container-padding">
        <div class="flex justify-between items-center h-16">
            <!-- Logo -->
            <div class="flex items-center">
                <a href="/" class="flex items-center space-x-3 hover:opacity-90 transition-opacity">
                    <img src="{% static 'images/logo.png' %}" alt="THINK eLearn" class="h-8 w-auto"
                         onload="this.nextElementSibling.style.display='none';"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="text-2xl font-heading font-bold text-primary-800" style="display: none;">THINK eLearn</span>
                </a>
            </div>

            <!-- Desktop Navigation -->
            <div class="hidden md:block">
                <div class="ml-10 flex items-center space-x-8">
                    <a href="/" class="text-neutral-700 hover:text-secondary-500 transition-colors font-medium">Home</a>
                    <a href="/about/" class="text-neutral-700 hover:text-secondary-500 transition-colors font-medium">About</a>
                    {% comment %} <a href="/portfolio/" class="text-neutral-700 hover:text-secondary-500 transition-colors font-medium">Portfolio</a> {% endcomment %}
                    <a href="/showcase/" class="text-neutral-700 hover:text-secondary-500 transition-colors font-medium">Showcase</a>
                    <a href="/process/" class="text-neutral-700 hover:text-secondary-500 transition-colors font-medium">Process</a>
                    {% comment %} <a href="/blog/" class="text-neutral-700 hover:text-secondary-500 transition-colors font-medium">Blog</a> {% endcomment %}
                    <a href="/contact/" class="btn-primary">Contact Us</a>
                </div>
            </div>

            <!-- Mobile menu button -->
            <div class="md:hidden">
                <button type="button" class="text-neutral-700 hover:text-secondary-500 transition-colors" id="mobile-menu-button" aria-label="Toggle mobile menu">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Navigation -->
        <div class="hidden md:hidden" id="mobile-menu">
            <div class="px-2 pt-2 pb-3 space-y-1 bg-cyan-50 border-t border-cyan-200">
                <a href="/" class="block px-3 py-2 text-neutral-700 hover:text-secondary-500 hover:bg-cyan-100 transition-colors font-medium">Home</a>
                <a href="/about/" class="block px-3 py-2 text-neutral-700 hover:text-secondary-500 hover:bg-cyan-100 transition-colors font-medium">About</a>
                {% comment %} <a href="/portfolio/" class="block px-3 py-2 text-neutral-700 hover:text-secondary-500 hover:bg-cyan-100 transition-colors font-medium">Portfolio</a> {% endcomment %}
                <a href="/showcase/" class="block px-3 py-2 text-neutral-700 hover:text-secondary-500 hover:bg-cyan-100 transition-colors font-medium">Showcase</a>
                <a href="/process/" class="block px-3 py-2 text-neutral-700 hover:text-secondary-500 hover:bg-cyan-100 transition-colors font-medium">Process</a>
                {% comment %} <a href="/blog/" class="block px-3 py-2 text-neutral-700 hover:text-secondary-500 hover:bg-cyan-100 transition-colors font-medium">Blog</a> {% endcomment %}
                <a href="/contact/" class="block px-3 py-2 btn-primary mx-3 text-center">Contact Us</a>
            </div>
        </div>
    </nav>
</header>
