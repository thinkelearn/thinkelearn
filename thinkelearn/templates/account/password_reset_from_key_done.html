{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Password Changed" %}{% endblock %}

{% block content %}
<div class="min-h-screen bg-neutral-50 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-lg bg-white shadow-lg rounded-2xl p-8">
        <div class="text-center">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
                <i class="fa-solid fa-check text-2xl text-green-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-primary-800">{% trans "Password changed" %}</h1>
            <p class="text-neutral-600 mt-4">
                {% trans "Your password has been successfully changed. You can now sign in with your new password." %}
            </p>
        </div>

        <div class="mt-8 text-center">
            <a href="{% url 'account_login' %}"
               class="inline-flex items-center justify-center rounded-md bg-secondary-500 px-6 py-2.5 text-sm font-semibold text-white hover:bg-secondary-600">
                {% trans "Sign in" %}
            </a>
        </div>
    </div>
</div>
{% endblock %}
